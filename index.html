<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bowman Hockey Location Dashboard</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="Hockey">
<meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #172033;
      --muted: #667085;
      --border: #d9dee7;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);

      --will: #f2c94c;
      --cam: #0057b8;
      --graycen: #39ff14;
      --oilers: #ff4c00;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px;
    }

    .hero {
      background: linear-gradient(135deg, #111827, #263246);
      color: white;
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    .hero h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 8px 0 0;
      color: #d7dde8;
      font-size: 15px;
    }

    .updated {
      font-size: 12px;
      color: #c9d1df;
      margin-top: 10px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin: 12px 0;
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      padding: 8px 0;
    }

    .tab {
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      border-radius: 999px;
      padding: 10px 8px;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
    }

    .tab.active {
      background: #111827;
      color: white;
      border-color: #111827;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 12px;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 20px;
      letter-spacing: -0.02em;
    }

    .small {
      color: var(--muted);
      font-size: 13px;
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .legend-pill {
      background: white;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 10px;
      font-weight: 900;
      font-size: 13px;
      display: flex;
      gap: 7px;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
    }

    .dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.18);
      flex: 0 0 auto;
    }

    .dot.will { background: var(--will); }
    .dot.cam { background: var(--cam); }
    .dot.graycen { background: var(--graycen); }
    .dot.oilers { background: var(--oilers); }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .control-btn {
      border: 1px solid var(--border);
      background: white;
      border-radius: 12px;
      padding: 9px 13px;
      font-weight: 900;
      cursor: pointer;
      color: #2563eb;
    }

    .month-label {
      font-weight: 900;
      font-size: 20px;
      letter-spacing: -0.02em;
      text-align: center;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .dow {
      text-align: center;
      font-size: 12px;
      font-weight: 900;
      color: var(--muted);
      padding: 6px 0;
    }

    .day {
      background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      min-height: 112px;
      padding: 8px;
      overflow: hidden;
      cursor: pointer;
    }

    .day.has-events {
      border-color: #b9c1d0;
    }

    .day.muted {
      opacity: 0.35;
    }

    .day-num {
      font-size: 12px;
      font-weight: 900;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .cal-event {
      font-size: 11px;
      line-height: 1.15;
      border-radius: 8px;
      padding: 5px 5px;
      margin-bottom: 4px;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }

    .cal-event.will { background: var(--will); color: #1f2937; }
    .cal-event.cam { background: var(--cam); color: white; }
    .cal-event.graycen { background: var(--graycen); color: #102a12; }
    .cal-event.oilers { background: var(--oilers); color: white; }

    .weekend-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 12px;
      background: white;
    }

    .weekend-header {
      padding: 12px 14px;
      background: #111827;
      color: white;
      font-weight: 900;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .weekend-body {
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .person-row {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 10px;
      align-items: stretch;
    }

    .person-name {
      border-radius: 12px;
      padding: 10px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #111827;
    }

    .person-name.will { background: var(--will); }
    .person-name.cam { background: #d9e8ff; color: #003a7a; border: 1px solid #a9c8f5; }
    .person-name.graycen { background: #d8ffd2; color: #178500; border: 1px solid #94f286; }
    .person-name.oilers { background: #ffe1d4; color: #00205b; border: 1px solid #ffb08c; }

    .location-box {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      background: #fbfcfe;
      min-height: 48px;
    }

    .location-box.empty {
      color: var(--muted);
      display: flex;
      align-items: center;
    }

    .event-title {
      font-weight: 900;
      line-height: 1.25;
    }

    .event-meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 3px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .chip {
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 900;
      border: 1px solid rgba(0,0,0,0.08);
      background: #eef2f7;
    }

    .chip.will { background: var(--will); color: #1f2937; }
    .chip.cam { background: var(--cam); color: white; }
    .chip.graycen { background: var(--graycen); color: #102a12; }
    .chip.oilers { background: var(--oilers); color: white; }

    .list-item {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 8px;
      background: #fbfcfe;
      border-left-width: 8px;
    }

    .list-item.will { border-left-color: var(--will); }
    .list-item.cam { border-left-color: var(--cam); }
    .list-item.graycen { border-left-color: var(--graycen); }
    .list-item.oilers { border-left-color: var(--oilers); }

    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      z-index: 50;
      padding: 18px;
      align-items: flex-end;
    }

    .modal-backdrop.active {
      display: flex;
    }

    .modal {
      background: white;
      border-radius: 22px;
      padding: 16px;
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      max-height: 82vh;
      overflow: auto;
      box-shadow: 0 24px 60px rgba(0,0,0,0.24);
    }

    .modal-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .close-btn {
      border: 1px solid var(--border);
      background: #f8fafc;
      border-radius: 999px;
      width: 38px;
      height: 38px;
      font-weight: 900;
      cursor: pointer;
    }

    .loading, .error {
      padding: 18px;
      border-radius: 16px;
      background: white;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .error {
      border-color: #f5b5b5;
      background: #fff7f7;
      color: #8a1f1f;
    }

    @media (max-width: 760px) {
      .app { padding: 10px; }

      .hero {
        padding: 18px;
        border-radius: 18px;
      }

      .hero h1 { font-size: 24px; }

      .tabs {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 6px;
      }

      .tab {
        font-size: 12px;
        padding: 9px 5px;
      }

      .legend {
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
      }

      .legend-pill {
        font-size: 11px;
        padding: 7px 5px;
      }

      .dot {
        width: 11px;
        height: 11px;
      }

      .person-row {
        grid-template-columns: 76px 1fr;
      }

      .calendar { gap: 4px; }

      .day {
        min-height: 88px;
        padding: 5px;
        border-radius: 9px;
      }

      .cal-event {
        font-size: 10px;
        padding: 4px 3px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="hero">
      <h1>Bowman Hockey Location Dashboard</h1>
      <p>Where everyone is by weekend, month, and location.</p>
      <div class="updated" id="updated">Loading…</div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-view="weekend">Weekend</button>
      <button class="tab" data-view="month">Month</button>
      <button class="tab" data-view="locations">Locations</button>
      <button class="tab" data-view="opportunities">Opps</button>
      <button class="tab" data-view="list">List</button>
    </nav>

    <div class="legend">
      <div class="legend-pill"><span class="dot will"></span>Will</div>
      <div class="legend-pill"><span class="dot cam"></span>Cam</div>
      <div class="legend-pill"><span class="dot graycen"></span>Graycen</div>
      <div class="legend-pill"><span class="dot oilers"></span>Oilers</div>
    </div>

    <main id="content">
      <div class="loading">Loading schedule data…</div>
    </main>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modal-top">
        <div class="modal-title" id="modalTitle">Details</div>
        <button class="close-btn" id="closeModal">×</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    const DATA_URL = "https://script.google.com/macros/s/AKfycbwntJkTzsE464tTYW3zeF0hepWvsN1AxS8kos05Ho_KELT0uFfNzP5qTnPdKWzulHFf/exec";

    const PEOPLE = ["Will", "Cam", "Graycen", "Oilers"];

    const PERSON_META = {
      Will: { key: "will", team: "Adrian" },
      Cam: { key: "cam", team: "URI" },
      Graycen: { key: "graycen", team: "Mission" },
      Oilers: { key: "oilers", team: "Oilers" }
    };

    let events = [];
    let activeMonth = new Date(2026, 8, 1);

    const content = document.getElementById("content");
    const updated = document.getElementById("updated");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const modalTitle = document.getElementById("modalTitle");
    const modalBody = document.getElementById("modalBody");

    document.getElementById("closeModal").addEventListener("click", closeModal);
    modalBackdrop.addEventListener("click", e => {
      if (e.target === modalBackdrop) closeModal();
    });

    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        render(btn.dataset.view);
      });
    });

    function parseDate(dateStr) {
      const parts = dateStr.split("-").map(Number);
      return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    function fmtFullDate(date) {
      return date.toLocaleDateString(undefined, {
        weekday: "long",
        month: "long",
        day: "numeric",
        year: "numeric"
      });
    }

    function fmtShortDate(date) {
      return date.toLocaleDateString(undefined, {
        month: "short",
        day: "numeric"
      });
    }

    function fmtRange(start, end) {
      if (start.toDateString() === end.toDateString()) return fmtFullDate(start);
      const sameMonth = start.getMonth() === end.getMonth();
      const sameYear = start.getFullYear() === end.getFullYear();

      if (sameMonth && sameYear) {
        return `${start.toLocaleDateString(undefined, { month: "short" })} ${start.getDate()}–${end.getDate()}, ${start.getFullYear()}`;
      }

      return `${fmtShortDate(start)} – ${fmtShortDate(end)}, ${end.getFullYear()}`;
    }

    function eventOverlapsDate(ev, date) {
      const s = parseDate(ev.startDate);
      const e = parseDate(ev.endDate || ev.startDate);
      const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      return d >= s && d <= e;
    }

    function eventOverlapsRange(ev, start, end) {
      const s = parseDate(ev.startDate);
      const e = parseDate(ev.endDate || ev.startDate);
      return s <= end && e >= start;
    }

    function getPersonKey(ev) {
      return (ev.colorKey || ev.person || "").toLowerCase();
    }

    function shortLocation(ev) {
      const city = (ev.city || "").trim();

      if (!city || city.toLowerCase() === "tbd") return "TBD";

      const firstPart = city.split(",")[0].trim();

      const aliases = {
        "Pittsburgh": "Pitt",
        "Stoney Creek": "Stoney",
        "Rosemont": "Rosemont",
        "Detroit": "Detroit",
        "Kitchener / Waterloo": "K/W",
        "Grand Rapids": "GR",
        "Pennsylvania": "PA",
        "Green Bay": "GB",
        "Kingston": "Kingston",
        "Adrian": "Adrian",
        "Angola": "Angola",
        "Lake Forest": "Lake Forest",
        "Appleton": "Appleton",
        "Stevens Point": "Stevens Pt",
        "Mequon": "Mequon",
        "Milwaukee": "Milwaukee",
        "Chicago": "Chicago",
        "Bethlehem": "Bethlehem",
        "Hauppauge": "Hauppauge",
        "Colmar": "Colmar",
        "Woodbridge": "Woodbridge",
        "Philadelphia": "Philly",
        "Faribault": "Faribault"
      };

      return aliases[firstPart] || firstPart;
    }

    function eventLine(ev) {
      return [ev.status, ev.city, ev.label].filter(Boolean).join(" — ");
    }

    function getSeasonStart() {
      if (!events.length) return new Date();
      return events.reduce((min, ev) => {
        const d = parseDate(ev.startDate);
        return d < min ? d : min;
      }, parseDate(events[0].startDate));
    }

    function getSeasonEnd() {
      if (!events.length) return new Date();
      return events.reduce((max, ev) => {
        const d = parseDate(ev.endDate || ev.startDate);
        return d > max ? d : max;
      }, parseDate(events[0].endDate || events[0].startDate));
    }

    function getWeekendRanges() {
      const min = getSeasonStart();
      const max = getSeasonEnd();

      const start = new Date(min);
      const offsetToFriday = (start.getDay() + 2) % 7;
      start.setDate(start.getDate() - offsetToFriday);

      const ranges = [];
      let d = new Date(start);

      while (d <= max) {
        const fri = new Date(d);
        const sun = new Date(d);
        sun.setDate(fri.getDate() + 2);

        const hasEvent = events.some(ev => eventOverlapsRange(ev, fri, sun));
        if (hasEvent) ranges.push({ start: fri, end: sun });

        d.setDate(d.getDate() + 7);
      }

      return ranges;
    }

    function render(view) {
      if (view === "weekend") renderWeekend();
      if (view === "month") renderMonth();
      if (view === "locations") renderLocations();
      if (view === "opportunities") renderOpportunities();
      if (view === "list") renderList();
    }

    function renderWeekend() {
      const ranges = getWeekendRanges();

      content.innerHTML = `
        <section>
          <div class="card">
            <h2 class="section-title">Weekend View</h2>
            <div class="small">Where everyone is each weekend.</div>
          </div>

          ${ranges.map(range => {
            const weekendEvents = events.filter(ev => eventOverlapsRange(ev, range.start, range.end));
            return `
              <div class="weekend-card">
                <div class="weekend-header">
                  <div>${fmtRange(range.start, range.end)}</div>
                  <div>${weekendEvents.length} item${weekendEvents.length === 1 ? "" : "s"}</div>
                </div>
                <div class="weekend-body">
                  ${PEOPLE.map(person => {
                    const personEvents = weekendEvents.filter(ev => ev.person === person);
                    const key = PERSON_META[person].key;

                    return `
                      <div class="person-row">
                        <div class="person-name ${key}">${person}</div>
                        <div class="location-box ${personEvents.length ? "" : "empty"}">
                          ${
                            personEvents.length
                              ? personEvents.map(ev => `
                                  <div style="margin-bottom: 8px;">
                                    <div class="event-title">${eventLine(ev)}</div>
                                    ${ev.notes ? `<div class="event-meta">${ev.notes}</div>` : ""}
                                  </div>
                                `).join("")
                              : "No scheduled location"
                          }
                        </div>
                      </div>
                    `;
                  }).join("")}
                </div>
              </div>
            `;
          }).join("")}
        </section>
      `;
    }

    function renderMonth() {
      const year = activeMonth.getFullYear();
      const month = activeMonth.getMonth();

      const first = new Date(year, month, 1);
      const start = new Date(first);
      start.setDate(first.getDate() - first.getDay());

      const days = [];
      const cur = new Date(start);

      for (let i = 0; i < 42; i++) {
        days.push(new Date(cur));
        cur.setDate(cur.getDate() + 1);
      }

      content.innerHTML = `
        <section>
          <div class="card">
            <div class="controls">
              <button class="control-btn" id="prevMonth">‹</button>
              <div class="month-label">${activeMonth.toLocaleDateString(undefined, { month: "long", year: "numeric" })}</div>
              <button class="control-btn" id="nextMonth">›</button>
            </div>

            <div class="calendar">
              ${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d => `<div class="dow">${d}</div>`).join("")}
              ${days.map(day => {
                const dayEvents = events.filter(ev => eventOverlapsDate(ev, day));
                const muted = day.getMonth() !== month ? "muted" : "";
                const hasEvents = dayEvents.length ? "has-events" : "";

                return `
                  <div class="day ${muted} ${hasEvents}" data-date="${day.toISOString()}">
                    <div class="day-num">${day.getDate()}</div>
                    ${dayEvents.map(ev => `
                      <div class="cal-event ${getPersonKey(ev)}">
                        ${shortLocation(ev)}
                      </div>
                    `).join("")}
                  </div>
                `;
              }).join("")}
            </div>
          </div>
        </section>
      `;

      document.getElementById("prevMonth").addEventListener("click", () => {
        activeMonth = new Date(year, month - 1, 1);
        renderMonth();
      });

      document.getElementById("nextMonth").addEventListener("click", () => {
        activeMonth = new Date(year, month + 1, 1);
        renderMonth();
      });

      document.querySelectorAll(".day").forEach(dayEl => {
        dayEl.addEventListener("click", () => {
          const date = new Date(dayEl.dataset.date);
          openDayDetails(date);
        });
      });
    }

    function openDayDetails(date) {
      const dayEvents = events.filter(ev => eventOverlapsDate(ev, date));

      modalTitle.textContent = fmtFullDate(date);

      modalBody.innerHTML = dayEvents.length
        ? dayEvents.map(ev => `
            <div class="list-item ${getPersonKey(ev)}">
              <div class="event-title">${ev.person} / ${ev.team}</div>
              <div class="event-meta"><strong>${ev.status}</strong> · ${ev.city || "TBD"}</div>
              <div class="event-meta">${ev.label || ""}</div>
              ${ev.notes ? `<div class="event-meta">${ev.notes}</div>` : ""}
            </div>
          `).join("")
        : `<div class="small">No scheduled locations for this date.</div>`;

      modalBackdrop.classList.add("active");
    }

    function closeModal() {
      modalBackdrop.classList.remove("active");
    }

    function renderLocations() {
      const byCity = {};

      events.forEach(ev => {
        const city = ev.city || "TBD";
        if (!byCity[city]) byCity[city] = [];
        byCity[city].push(ev);
      });

      const cities = Object.keys(byCity).sort();

      content.innerHTML = `
        <section>
          <div class="card">
            <h2 class="section-title">Locations</h2>
            <div class="small">Grouped by city/location so you can see travel clusters.</div>
          </div>

          ${cities.map(city => `
            <div class="card">
              <h3 class="section-title">${city}</h3>
              ${byCity[city]
                .sort((a,b) => parseDate(a.startDate) - parseDate(b.startDate))
                .map(ev => `
                  <div class="list-item ${getPersonKey(ev)}">
                    <div class="event-title">${ev.person} — ${ev.label}</div>
                    <div class="event-meta">${fmtRange(parseDate(ev.startDate), parseDate(ev.endDate || ev.startDate))} · ${ev.status}</div>
                    ${ev.notes ? `<div class="event-meta">${ev.notes}</div>` : ""}
                  </div>
                `).join("")}
            </div>
          `).join("")}
        </section>
      `;
    }

    function renderOpportunities() {
      const ranges = getWeekendRanges();

      content.innerHTML = `
        <section>
          <div class="card">
            <h2 class="section-title">Opportunities</h2>
            <div class="small">
              This will become more powerful after the Oilers schedule is added. For now, it flags busy family weekends.
            </div>
          </div>

          ${ranges.map(range => {
            const weekendEvents = events.filter(ev => eventOverlapsRange(ev, range.start, range.end));
            return `
              <div class="card">
                <h3 class="section-title">${fmtRange(range.start, range.end)}</h3>
                <div class="chips">
                  ${weekendEvents.map(ev => `
                    <span class="chip ${getPersonKey(ev)}">${ev.person}: ${shortLocation(ev)}</span>
                  `).join("")}
                </div>
              </div>
            `;
          }).join("")}
        </section>
      `;
    }

    function renderList() {
      const sorted = [...events].sort((a,b) => parseDate(a.startDate) - parseDate(b.startDate));

      content.innerHTML = `
        <section>
          <div class="card">
            <h2 class="section-title">Full List</h2>
            <div class="small">Chronological list of all location blocks.</div>
          </div>

          ${sorted.map(ev => `
            <div class="list-item ${getPersonKey(ev)}">
              <div class="event-title">${ev.person} — ${ev.label}</div>
              <div class="event-meta">${fmtRange(parseDate(ev.startDate), parseDate(ev.endDate || ev.startDate))}</div>
              <div class="event-meta">${ev.status} · ${ev.city}</div>
              ${ev.notes ? `<div class="event-meta">${ev.notes}</div>` : ""}
            </div>
          `).join("")}
        </section>
      `;
    }

    async function loadData() {
      try {
        const res = await fetch(DATA_URL);
        const data = await res.json();

        if (!data.success) {
          throw new Error(data.error || "Unknown data error");
        }

        events = data.events || [];
        activeMonth = new Date(getSeasonStart().getFullYear(), getSeasonStart().getMonth(), 1);

        updated.textContent = `${events.length} items · Updated ${new Date(data.updatedAt).toLocaleString()}`;
        renderWeekend();

      } catch (err) {
        content.innerHTML = `
          <div class="error">
            <strong>Could not load schedule data.</strong>
            <div style="margin-top: 8px;">${err.message}</div>
            <div style="margin-top: 8px; font-size: 13px;">
              Check that the Apps Script deployment is public and that the Web App URL is correct.
            </div>
          </div>
        `;
        updated.textContent = "Data error";
      }
    }

    loadData();
  </script>
</body>
</html>
